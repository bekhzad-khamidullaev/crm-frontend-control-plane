version: "3.8"

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_MODE: production
    container_name: crm-frontend-production
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    environment:
      - API_BASE_URL=https://crm.windevs.uz
      - API_PREFIX=/api
      - PBX_SERVER=wss://crm.windevs.uz/asterisk/ws
    volumes:
      - ./logs/nginx:/var/log/nginx
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  frontend-staging:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_MODE: staging
    container_name: crm-frontend-staging
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:80"
    environment:
      - API_BASE_URL=https://crm.windevs.uz
      - API_PREFIX=/api
      - PBX_SERVER=wss://crm.windevs.uz/asterisk/ws
    profiles:
      - staging
