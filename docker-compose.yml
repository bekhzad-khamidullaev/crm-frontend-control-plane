name: crm-frontend

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_MODE: production
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    env_file:
      - .env.production
    environment:
      API_BASE_URL: ${API_BASE_URL:-https://api.crm.windevs.uz}
      API_PREFIX: ${API_PREFIX:-/api}
      PBX_SERVER: ${PBX_SERVER:-wss://crm.windevs.uz/asterisk/ws}
    volumes:
      - ./logs/nginx:/var/log/nginx
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
