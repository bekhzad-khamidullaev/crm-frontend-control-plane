version: "3.8"

services:
  console-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_MODE: production
    container_name: crm-console-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8082:80"
    environment:
      - API_BASE_URL=https://api.console.crm.windevs.uz
      - API_PREFIX=/api
      - PBX_SERVER=wss://console.crm.windevs.uz/asterisk/ws
    volumes:
      - ./logs/nginx-console:/var/log/nginx
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
