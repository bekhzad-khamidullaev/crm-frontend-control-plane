name: crm-frontend-control-plane-prod

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_MODE: production
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      API_BASE_URL: ${API_BASE_URL:-https://api.console.crm.windevs.uz}
      API_PREFIX: ${API_PREFIX:-/api}
      PBX_SERVER: ${PBX_SERVER:-wss://api.console.crm.windevs.uz/asterisk/ws}
    ports:
      - "127.0.0.1:${CRM_CONTROL_PLANE_FRONTEND_PORT:-8082}:80"
    volumes:
      - ./logs/nginx:/var/log/nginx
    networks:
      - crm_frontend_control_plane_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  crm_frontend_control_plane_network:
    driver: bridge
