        ws_reconnect_max_attempts:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          title: Realtime reconnect max attempts
        ws_reconnect_base_delay_ms:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          title: Realtime reconnect base delay, ms
        ws_reconnect_max_delay_ms:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          title: Realtime reconnect max delay, ms
        ws_heartbeat_interval_sec:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          title: Realtime heartbeat interval, sec
        ws_heartbeat_timeout_sec:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          title: Realtime heartbeat timeout, sec
        polling_fallback_enabled:
          type: boolean
          title: Enable polling fallback
        incoming_enabled:
          type: boolean
          title: Show incoming pop-ups
        incoming_poll_interval_ms:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          title: Polling interval, ms
        incoming_popup_ttl_ms:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          title: Popup duration, ms
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - id
      - updated_at
    VoipSystemSettings:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        ami_host:
          type: string
          maxLength: 128
        ami_port:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        ami_username:
          type: string
          maxLength: 128
        ami_secret:
          type: string
          description: Stored in plain text in DB; restrict admin access.
          maxLength: 255
        ami_use_ssl:
          type: boolean
          title: AMI over SSL
        ami_connect_timeout:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          title: AMI connect timeout, seconds
        ami_reconnect_delay:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          title: AMI reconnect delay, seconds
        incoming_enabled:
          type: boolean
          title: Show incoming pop-ups
        incoming_poll_interval_ms:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          title: Polling interval, ms
        incoming_popup_ttl_ms:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          title: Popup duration, ms
        telephony_route_mode:
          description: |-
            Global outbound call routing mode for CRM

            * `embedded` - Embedded Asterisk (CRM-managed)
            * `bridge` - External Asterisk via PBX Bridge
          oneOf:
          - $ref: '#/components/schemas/TelephonyRouteModeEnum'
          - $ref: '#/components/schemas/BlankEnum'
        telephony_provider:
          title: Preferred provider
          description: |-
            Global preferred provider for outbound calls

            * `Asterisk` - Asterisk
          oneOf:
          - $ref: '#/components/schemas/TelephonyProviderEnum'
          - $ref: '#/components/schemas/BlankEnum'
        webrtc_stun_servers:
          type: string
          description: Comma or newline separated STUN URLs
        webrtc_turn_enabled:
          type: boolean
        webrtc_turn_server:
          type: string
          description: 'Example: turn:turn.example.com:3478?transport=udp'
          maxLength: 255
        webrtc_turn_username:
          type: string
          maxLength: 128
        webrtc_turn_password:
          type: string
          maxLength: 255
        forward_unknown_calls:
          type: boolean
          title: Forward unknown callers
          description: Forward webhook payload to external URL when no CRM objects
            are matched
        forward_url:
          type: string
          format: uri
          maxLength: 500
        forwarding_allowed_ip:
          type: string
          title: Allowed IP for forwarding source
          description: 'Optional: restrict forwarding source IP check (for relayed
            requests)'
          maxLength: 64
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - id
      - updated_at
    WarehouseItem:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 250
        sku:
          type: string
          maxLength: 120
        category:
          type: string
          maxLength: 120
        location:
          type: string
          maxLength: 120
        unit:
          type: string
          maxLength: 32
        quantity:
          type: string
          format: decimal
          pattern: ^-?\d{0,11}(?:\.\d{0,3})?$
        min_quantity:
          type: string
          format: decimal
          pattern: ^-?\d{0,11}(?:\.\d{0,3})?$
          title: Minimum quantity
        unit_cost:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
        status:
          $ref: '#/components/schemas/WarehouseItemStatusEnum'
        note:
          type: string
        owner:
          type: integer
          nullable: true
        creation_date:
          type: string
          format: date-time
          readOnly: true
        update_date:
          type: string
          format: date-time
          readOnly: true
      required:
      - creation_date
      - id
      - name
      - update_date
    WarehouseItemStatusEnum:
      enum:
      - active
      - archived
      type: string
      description: |-
        * `active` - Active
        * `archived` - Archived
    Webhook:
      type: object
      description: Serializer for webhooks (list/retrieve - secret is masked).
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        url:
          type: string
          format: uri
          description: The URL to send webhook POST requests to
          maxLength: 200
        events:
          description: List of events that trigger this webhook
        secret_preview:
          type: string
          nullable: true
          description: Return masked preview of secret.
          readOnly: true
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        last_triggered:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        success_count:
          type: integer
          readOnly: true
        failure_count:
          type: integer
          readOnly: true
      required:
      - created_at
      - failure_count
      - id
      - last_triggered
      - secret_preview
      - success_count
      - url
    WebhookCreate:
      type: object
      description: Serializer for creating webhooks (includes secret in response).
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        url:
          type: string
          format: uri
          description: The URL to send webhook POST requests to
          maxLength: 200
        events:
          description: List of events that trigger this webhook
        secret:
          type: string
          readOnly: true
          description: Secret key for HMAC signature verification
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - secret
      - url
    WhatsAppBusinessAccount:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        business_name:
          type: string
          maxLength: 255
        phone_number:
          type: string
          maxLength: 32
        phone_number_id:
          type: string
          maxLength: 100
        business_account_id:
          type: string
          maxLength: 100
        is_active:
          type: boolean
        auto_sync_messages:
          type: boolean
        auto_create_leads:
          type: boolean
        webhook_url:
          type: string
          format: uri
          maxLength: 200
        messages_received:
          type: integer
          readOnly: true
        messages_sent:
          type: integer
          readOnly: true
        last_activity_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        connected_by_username:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - business_name
      - connected_by_username
      - created_at
      - id
      - last_activity_at
      - messages_received
      - messages_sent
      - phone_number_id
      - updated_at
    WhatsAppBusinessAccountCreate:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        business_name:
          type: string
          maxLength: 255
        phone_number:
          type: string
          maxLength: 32
        phone_number_id:
          type: string
          maxLength: 100
        business_account_id:
          type: string
          maxLength: 100
        access_token:
          type: string
          writeOnly: true
        app_secret:
          type: string
          writeOnly: true
        verify_token:
          type: string
        is_active:
          type: boolean
        auto_sync_messages:
          type: boolean
        auto_create_leads:
          type: boolean
        webhook_url:
          type: string
          format: uri
          maxLength: 200
      required:
      - access_token
      - business_name
      - id
      - phone_number_id
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    tokenAuth:
      type: apiKey
      in: header
      name: Authorization
      description: Token-based authentication with required prefix "Token"
