      description: Serializer for UserProfile model
      properties:
        user:
          type: integer
          readOnly: true
        username:
          type: string
          readOnly: true
        email:
          type: string
          format: email
        full_name:
          type: string
        avatar:
          type: string
          format: uri
          readOnly: true
          nullable: true
          description: User profile picture (max 5MB)
        avatar_url:
          type: string
          nullable: true
          readOnly: true
        pbx_number:
          type: string
          title: Phone
          maxLength: 20
        utc_timezone:
          type: string
        activate_timezone:
          type: boolean
          title: Activate this time zone
        language_code:
          type: string
      required:
      - avatar
      - avatar_url
      - user
      - username
    UserSoftphoneSettings:
      type: object
      properties:
        display_name:
          type: string
        sip_ws_uri:
          type: string
        sip_uri:
          type: string
        webrtc_stun_servers:
          type: string
        webrtc_turn_enabled:
          type: boolean
          nullable: true
        webrtc_turn_server:
          type: string
        webrtc_turn_username:
          type: string
        webrtc_turn_password:
          type: string
        sip_username:
          type: string
          readOnly: true
        sip_realm:
          type: string
          readOnly: true
        extension:
          type: string
          readOnly: true
        outbound_mode:
          type: string
          readOnly: true
      required:
      - extension
      - outbound_mode
      - sip_realm
      - sip_username
    UserWrite:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        is_staff:
          type: boolean
          title: Staff status
          description: Designates whether the user can log into this admin site.
        is_superuser:
          type: boolean
          title: Superuser status
          description: Designates that this user has all permissions without explicitly
            assigning them.
        groups:
          type: array
          items:
            type: string
          writeOnly: true
          description: List of Django group (department) names
        roles:
          type: array
          items:
            type: string
          writeOnly: true
          description: 'List of business roles: platform_admin | sales_manager | sales_rep
            | marketing_manager | support_agent | operations_manager | finance_manager
            | warehouse_manager | crm_analyst | read_only_auditor'
        permissions:
          type: array
          items:
            type: string
          writeOnly: true
          description: List of permissions in "app_label.codename" or unique "codename"
            format
        password:
          type: string
          writeOnly: true
          minLength: 8
      required:
      - id
      - username
    VoipAmiTestResult:
      type: object
      properties:
        ok:
          type: boolean
        status:
          type: string
        latency_ms:
          type: integer
          nullable: true
        checked_at:
          type: string
          format: date-time
        message:
          type: string
        response:
          type: string
          nullable: true
        ping:
          type: string
          nullable: true
      required:
      - checked_at
      - latency_ms
      - message
      - ok
      - status
    VoipClientSettings:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        webrtc_stun_servers:
          type: string
          description: Comma or newline separated STUN URLs
        webrtc_turn_enabled:
          type: boolean
        webrtc_turn_server:
          type: string
          description: 'Example: turn:turn.example.com:3478?transport=udp'
          maxLength: 255
        webrtc_turn_username:
          type: string
          maxLength: 128
        webrtc_turn_password:
          type: string
          maxLength: 255
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - id
      - updated_at
    VoipRealtimeSettings:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        ws_enabled:
          type: boolean
          title: Enable realtime WebSocket transport
        ws_url:
          type: string
          title: Realtime WebSocket URL
          maxLength: 500
        ws_auth_mode:
          type: string
          title: Realtime auth mode
          description: token, query_token or none
          maxLength: 24
        ws_token:
          type: string
          title: Realtime auth token
          maxLength: 512
        ws_reconnect_enabled:
          type: boolean
          title: Enable realtime reconnect
        ws_reconnect_max_attempts:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          title: Realtime reconnect max attempts
        ws_reconnect_base_delay_ms:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          title: Realtime reconnect base delay, ms
        ws_reconnect_max_delay_ms:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          title: Realtime reconnect max delay, ms
        ws_heartbeat_interval_sec:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          title: Realtime heartbeat interval, sec
        ws_heartbeat_timeout_sec:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          title: Realtime heartbeat timeout, sec
        polling_fallback_enabled:
          type: boolean
          title: Enable polling fallback
        incoming_enabled:
          type: boolean
          title: Show incoming pop-ups
        incoming_poll_interval_ms:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          title: Polling interval, ms
        incoming_popup_ttl_ms:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          title: Popup duration, ms
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - id
      - updated_at
    VoipRoutingPreview:
      type: object
      properties:
        caller_id:
          type: string
        called_number:
          type: string
        route_mode:
          type: string
        provider:
          type: string
        decision:
          type: string
        reason:
          type: string
        target_extension:
          type: string
        default_extension:
          type: string
        fallback_extension:
          type: string
        matched_type:
          type: string
        matched_object_id:
          type: integer
          nullable: true
        owner_user_id:
          type: integer
          nullable: true
        owner_username:
          type: string
        owner_sip_status:
          type: string
        should_reroute:
          type: boolean
      required:
      - caller_id
      - decision
      - default_extension
      - fallback_extension
      - matched_object_id
      - matched_type
      - owner_sip_status
      - owner_user_id
      - owner_username
      - provider
      - reason
      - route_mode
      - should_reroute
      - target_extension
    VoipRoutingSettings:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        telephony_route_mode:
          description: |-
            Global outbound call routing mode for CRM browser telephony.

            * `embedded` - AMI-managed PBX routing
            * `bridge` - Go connector PBX routing
          oneOf:
          - $ref: '#/components/schemas/TelephonyRouteModeEnum'
          - $ref: '#/components/schemas/BlankEnum'
        telephony_provider:
          title: Preferred provider
          description: |-
            Global preferred provider for outbound calls

            * `Asterisk` - Asterisk
          oneOf:
          - $ref: '#/components/schemas/TelephonyProviderEnum'
          - $ref: '#/components/schemas/BlankEnum'
        forward_unknown_calls:
          type: boolean
          title: Forward unknown callers
          description: Forward webhook payload to external URL when no CRM objects
            are matched
        forward_url:
          type: string
          format: uri
          maxLength: 500
        forwarding_allowed_ip:
          type: string
          title: Allowed IP for forwarding source
          description: 'Optional: restrict forwarding source IP check (for relayed
            requests)'
          maxLength: 64
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - id
      - updated_at
    VoipSystemSettings:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        telephony_event_mode:
          title: Telephony event integration mode
          description: |-
            bridge: CRM receives events from the Go connector webhook; ami: CRM receives events from direct AMI ingest

            * `bridge` - Go connector webhook ingest
            * `ami` - Direct AMI ingest
          oneOf:
          - $ref: '#/components/schemas/TelephonyEventModeEnum'
          - $ref: '#/components/schemas/BlankEnum'
        ami_host:
          type: string
          maxLength: 128
        ami_port:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        ami_username:
          type: string
          maxLength: 128
        ami_secret:
          type: string
          description: Stored in plain text in DB; restrict admin access.
          maxLength: 255
        ami_use_ssl:
          type: boolean
          title: AMI over SSL
        ami_connect_timeout:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          title: AMI connect timeout, seconds
        ami_reconnect_delay:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          title: AMI reconnect delay, seconds
        internal_api_token:
          type: string
          title: Internal API token (Go connector)
          description: Secret token for the Go connector to authenticate webhooks.
          maxLength: 255
        connector_allowed_ips:
          type: string
          description: Comma or newline separated list of IP addresses allowed to
            call connector webhook endpoints. Leave empty to rely on token auth only
            (allow all IPs).
          maxLength: 1024
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - id
      - updated_at
    WarehouseItem:
      type: object
