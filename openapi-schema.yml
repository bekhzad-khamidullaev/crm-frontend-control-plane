components:
  schemas:
    AIAssistProvidersResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        provider:
          type: string
        model:
          type: string
        is_default:
          type: boolean
      required:
      - id
      - is_default
      - model
      - name
      - provider
    AIAssistRequest:
      type: object
      description: Serializer for AI assist requests.
      properties:
        provider_id:
          type: string
          format: uuid
        use_case:
          allOf:
          - $ref: '#/components/schemas/UseCaseEnum'
          default: custom
        input_text:
          type: string
          maxLength: 20000
        crm_context:
          type: object
          additionalProperties: {}
        chat_history:
          type: array
          items:
            type: object
            additionalProperties: {}
          maxItems: 20
        system_prompt:
          type: string
          default: ''
        temperature:
          type: number
          format: double
          maximum: 2.0
          minimum: 0.0
        max_tokens:
          type: integer
          maximum: 8000
          minimum: 1
      required:
      - input_text
    AIAssistResponse:
      type: object
      description: Serializer for AI assist response payload.
      properties:
        provider:
          type: string
        provider_name:
          type: string
        model:
          type: string
        output_text:
          type: string
        use_case:
          type: string
        request_id:
          type: string
        surface:
          type: string
        mode:
          $ref: '#/components/schemas/ModeEnum'
        evidence:
          type: array
          items:
            type: string
        risk_flags:
          type: array
          items:
            type: string
        meta:
          type: object
          additionalProperties: {}
        response_data:
          type: object
          additionalProperties: {}
      required:
      - mode
      - model
      - output_text
      - provider
      - provider_name
      - request_id
      - surface
      - use_case
    AIProviderSettings:
      type: object
      description: Serializer for AI provider settings.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          description: Human-readable provider name for UI and routing
          maxLength: 100
        provider:
          $ref: '#/components/schemas/AIProviderSettingsProviderEnum'
        api_key:
          type: string
          writeOnly: true
        api_key_preview:
          type: string
          readOnly: true
        base_url:
          type: string
          format: uri
          description: Optional custom base URL for self-hosted or compatible APIs
          maxLength: 200
        model:
          type: string
          maxLength: 120
        is_active:
          type: boolean
        is_default:
          type: boolean
          description: Used as fallback when request does not specify provider
        timeout_seconds:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        temperature:
          type: number
          format: double
        max_tokens:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        extra_headers: {}
        extra_config:
          description: Provider-specific options (e.g., anthropic_version, endpoint)
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - api_key_preview
      - created_at
      - id
      - name
      - provider
      - updated_at
    AIProviderSettingsProviderEnum:
      enum:
      - openai
      - gemini
      - claude
      - openai_compatible
      - custom
      type: string
      description: |-
        * `openai` - OpenAI
        * `gemini` - Google Gemini
        * `claude` - Anthropic Claude
        * `openai_compatible` - OpenAI Compatible
        * `custom` - Custom HTTP
    APIKey:
      type: object
      description: Serializer for API keys (list/retrieve).
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          description: Descriptive name for this API key
          maxLength: 255
        key_preview:
          type: string
          readOnly: true
        permissions:
          description: List of permission scopes for this key
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        last_used:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        usage_count:
          type: integer
          readOnly: true
      required:
      - created_at
      - id
      - key_preview
      - last_used
      - name
      - usage_count
    APIKeyCreate:
      type: object
      description: Serializer for creating API keys (includes full key in response).
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          description: Descriptive name for this API key
          maxLength: 255
        key:
          type: string
          readOnly: true
        key_preview:
          type: string
          readOnly: true
        permissions:
          description: List of permission scopes for this key
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - key
      - key_preview
      - name
    ActiveSession:
      type: object
      description: Serializer for active user sessions.
      properties:
        session_key:
          type: string
          readOnly: true
          description: Django session key or JWT token ID
        user_id:
          type: integer
          readOnly: true
        user_email:
          type: string
          format: email
          readOnly: true
        ip_address:
          type: string
          readOnly: true
          nullable: true
        user_agent:
          type: string
          readOnly: true
        device_name:
          type: string
          readOnly: true
          description: Browser and OS information
        last_activity:
          type: string
          format: date-time
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - device_name
      - ip_address
      - last_activity
      - session_key
      - user_agent
      - user_email
      - user_id
    AgentPresence:
      type: object
      description: Agent presence status with SIP registration state.
      properties:
        user_id:
          type: integer
        username:
          type: string
        extension:
          type: string
        is_online:
          type: boolean
        is_in_call:
          type: boolean
        current_call_id:
          type: integer
          nullable: true
        current_call_status:
          type: string
      required:
      - current_call_id
      - current_call_status
      - extension
      - is_in_call
      - is_online
      - user_id
      - username
    AssigneeTypeEnum:
      enum:
      - user
      - group
      type: string
      description: |-
        * `user` - user
        * `group` - group
    AuditLog:
      type: object
      description: Serializer for security audit logs.
      properties:
        id:
          type: integer
          readOnly: true
        user_id:
          type: integer
          nullable: true
          readOnly: true
        user_email:
          type: string
          format: email
          readOnly: true
          nullable: true
        username:
          type: string
          readOnly: true
          description: Username attempted (stored even if auth failed)
        auth_type:
          allOf:
          - $ref: '#/components/schemas/AuthTypeEnum'
          readOnly: true
          title: Authentication Type
        endpoint:
          type: string
          readOnly: true
          description: API endpoint accessed
        method:
          type: string
          readOnly: true
          title: HTTP Method
        success:
          type: boolean
          readOnly: true
        ip_address:
          type: string
          readOnly: true
          nullable: true
        user_agent:
          type: string
          readOnly: true
        timestamp:
          type: string
          format: date-time
          readOnly: true
        details:
          type: object
