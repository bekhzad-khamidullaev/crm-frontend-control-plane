      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        url:
          type: string
          format: uri
          description: The URL to send webhook POST requests to
          maxLength: 200
        events:
          description: List of events that trigger this webhook
        secret:
          type: string
          readOnly: true
          description: Secret key for HMAC signature verification
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - secret
      - url
    WhatsAppBusinessAccount:
