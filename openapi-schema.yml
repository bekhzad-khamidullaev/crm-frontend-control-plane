        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        last_triggered:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        success_count:
          type: integer
          readOnly: true
        failure_count:
          type: integer
          readOnly: true
