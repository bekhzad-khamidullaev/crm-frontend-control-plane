# Production Nginx configuration for crm.windevs.uz CRM Frontend
# This config serves the React SPA and proxies API requests to backend

server {
    listen 80;
    listen [::]:80;
    server_name crm.windevs.uz;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name crm.windevs.uz;

    # SSL Configuration (update paths to your actual certificates)
    ssl_certificate /etc/ssl/certs/windevs.uz/fullchain.pem;
    ssl_certificate_key /etc/ssl/certs/windevs.uz/privkey.pem;
    
    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' https://api.crm.windevs.uz wss://api.crm.windevs.uz https://pbx.windevs.uz wss://pbx.windevs.uz; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://api.crm.windevs.uz wss://api.crm.windevs.uz https://pbx.windevs.uz wss://pbx.windevs.uz;" always;

    # Root directory for built React app
    root /var/www/windevs.uz/dist;
    index index.html;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;
    gzip_disable "msie6";

    # Brotli Compression (if available)
    # brotli on;
    # brotli_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    # Client body size (for file uploads)
    client_max_body_size 100M;

    # Logging
    access_log /var/log/nginx/crm.windevs.uz.access.log;
    error_log /var/log/nginx/crm.windevs.uz.error.log warn;

    # API proxy to Django backend (api.crm.windevs.uz:8443)
    location /api/ {
        proxy_pass https://api.crm.windevs.uz:8443/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host api.crm.windevs.uz;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        # SSL verification settings
        proxy_ssl_verify off;
        proxy_ssl_server_name on;
    }

    # WebSocket proxy for calls
    location /ws/calls/ {
        proxy_pass https://api.crm.windevs.uz:8443/ws/calls/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host api.crm.windevs.uz;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        # SSL verification settings
        proxy_ssl_verify off;
        proxy_ssl_server_name on;
    }

    # WebSocket proxy for chat
    location /ws/chat/ {
        proxy_pass https://api.crm.windevs.uz:8443/ws/chat/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host api.crm.windevs.uz;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        # SSL verification settings
        proxy_ssl_verify off;
        proxy_ssl_server_name on;
    }

    # Media files proxy (if Django serves media)
    location /media/ {
        proxy_pass https://api.crm.windevs.uz:8443/media/;
        proxy_set_header Host api.crm.windevs.uz;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 30d;
        add_header Cache-Control "public, immutable";
        # SSL verification settings
        proxy_ssl_verify off;
        proxy_ssl_server_name on;
    }

    # Static assets with cache control
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Service worker (no cache)
    location /service-worker.js {
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        try_files $uri =404;
    }

    # Favicon and manifest
    location ~* \.(ico|png|webmanifest)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # SPA fallback - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
