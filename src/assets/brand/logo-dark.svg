    <path d="M35 27L49 39L35 52" fill="none" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="64.5" cy="39" r="4" fill="#f8fafc"/>
  </g>

  <text x="112" y="47" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="33" font-weight="700" fill="#e2e8f0">
    Enterprise CRM
  </text>
  <text x="114" y="69" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="13" letter-spacing="2.6" fill="#94a3b8">
